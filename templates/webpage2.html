<!DOCTYPE html>
<html>
<head>
    <title>Elder Care Setup</title>

    <style>

        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin: auto;
            width: 90%;
            max-width: 500px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

<div class="box">

    <h2>Elder Care WiFi Setup</h2>

    <form method="POST" action="/connect">

        <select name="ssid">

            {% for wifi in wifi_list %}

                <option value="{{ wifi[0] }}">
                    {{ wifi[0] }} ({{ wifi[1] }}%)
                </option>

            {% endfor %}

        </select>

        <input type="password"
               name="password"
               placeholder="WiFi Password">

        <button type="submit">
            Connect WiFi
        </button>

    </form>

    <h3>Live Camera</h3>

    <img src="/video_feed">

</div>

</body>
</html>
